<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Dashboard (Google Sheets Backend)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@400;500&family=Lato:wght@400;700&family=Montserrat:wght@400;600&family=Poppins:wght@400;600&family=Nunito:wght@400;600&family=Merriweather:wght@400;700&family=Source+Sans+Pro:wght@400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ====== ALL ORIGINAL CSS STYLES (PRESERVED) ====== */
        :root { --primary: #3EA899; --primary-light: #E0F2F1; --primary-dark: #2D7D78; --secondary: #4A89DC; --accent: #4CC9F0; --success: #48BB78; --warning: #ED8936; --danger: #F56565; --dark: #1A202C; --dark-gray: #2D3748; --medium: #718096; --light-gray: #E2E8F0; --light: #F7FAFC; --lighter: #FFFFFF; --font-main: 'Inter', sans-serif; --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem; --text-lg: 1.125rem; --text-xl: 1.25rem; --text-2xl: 1.5rem; --text-3xl: 1.875rem; --text-4xl: 2.25rem; --space-xxs: 0.25rem; --space-xs: 0.5rem; --space-sm: 0.75rem; --space-md: 1rem; --space-lg: 1.5rem; --space-xl: 2rem; --space-2xl: 3rem; --shadow-sm: 0 1px 3px 0 rgba(0,0,0,0.1); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1); --shadow-primary: 0 0 0 3px rgba(62,168,153,0.3); --radius-sm: 4px; --radius-md: 6px; --radius-lg: 8px; --radius-xl: 12px; --radius-full: 9999px; --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1); --transition-normal: 0.3s cubic-bezier(0.4,0,0.2,1); }
        body.dark-mode { --primary: #38B2AC; --primary-light: #2C7A7B; --primary-dark: #285E61; --secondary: #4299E1; --accent: #0BC5EA; --success: #48BB78; --warning: #ED8936; --danger: #E53E3E; --dark: #171923; --dark-gray: #1A202C; --medium: #A0AEC0; --light-gray: #2D3748; --light: #171923; --lighter: #2D3748; background-color: #1A202C; color: #A0AEC0; }
        body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4, body.dark-mode .sidebar-title, body.dark-mode .topbar-title { color: white; }
        body.dark-mode .topbar, body.dark-mode .sidebar, body.dark-mode .post-card, body.dark-mode .reminders-container, body.dark-mode .modal-content { background-color: #2D3748; border-color: #4A5568; }
        body.dark-mode .post-card.expanded { background-color: #F7FAFC; color: #1A202C; }
        body.dark-mode .post-card.expanded h3, body.dark-mode .post-card.expanded .post-meta { color: #1A202C; }
        body.dark-mode .sidebar-link { color: #FFFFFF; }
        body.dark-mode .sidebar-link.active { background-color: #2C7A7B; color: white; }
        body.dark-mode input, body.dark-mode textarea, body.dark-mode select { background-color: #1A202C; border-color: #4A5568; color: white; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { margin: 0; font-family: var(--font-main); display: flex; min-height: 100vh; background: var(--light); line-height: 1.5; color: var(--dark); transition: background-color var(--transition-normal); }
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 54px; background: var(--lighter); border-bottom: 1px solid var(--light-gray); z-index: 1000; display: flex; align-items: center; padding: 0 var(--space-lg); }
        .topbar-content { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .topbar-left { display: flex; align-items: center; gap: var(--space-sm); }
        .topbar-logo { height: 36px; }
        .topbar-title { font-size: var(--text-lg); font-weight: 600; color: var(--dark); }
        .topbar-button { padding: var(--space-xs) var(--space-sm); background: transparent; color: var(--dark); border-radius: var(--radius-md); font-weight: 500; font-size: var(--text-sm); transition: all var(--transition-fast); border: 1px solid var(--light-gray); display: flex; align-items: center; gap: var(--space-xs); cursor: pointer; }
        .topbar-button:hover { background: var(--light); color: var(--primary); border-color: var(--primary-light); }
        .profile-dropdown { position: relative; display: inline-block; }
        .profile-dropdown-content { display: none; position: absolute; right: 0; top: calc(100% + 8px); background-color: var(--lighter); min-width: 220px; box-shadow: var(--shadow-md); border-radius: var(--radius-md); z-index: 1001; border: 1px solid var(--light-gray); padding: var(--space-xs); }
        .profile-dropdown:hover .profile-dropdown-content { display: block; }
        .profile-dropdown-content a { color: var(--dark); padding: var(--space-sm) var(--space-md); text-decoration: none; display: flex; align-items: center; gap: var(--space-sm); font-size: var(--text-sm); border-radius: var(--radius-sm); }
        .profile-dropdown-content a:hover { background-color: var(--light); color: var(--primary); }
        .sidebar { width: 260px; background: white; flex-shrink: 0; min-height: 100vh; position: fixed; top: 54px; bottom: 0; border-right: 1px solid var(--light-gray); display: flex; flex-direction: column; }
        .sidebar-header { display: flex; align-items: center; gap: var(--space-sm); padding: var(--space-lg); border-bottom: 1px solid var(--light-gray); }
        .sidebar-logo { width: 36px; height: 36px; }
        .sidebar-title { font-size: var(--text-lg); font-weight: 600; margin: 0; margin-right: auto; }
        .add-tab-header-button { background: transparent; border: none; color: var(--medium); cursor: pointer; width: 32px; height: 32px; border-radius: var(--radius-md); }
        .sidebar-menu { list-style: none; padding: var(--space-sm) 0; overflow-y: auto; flex-grow: 1; }
        .sidebar-item { margin-bottom: var(--space-xxs); padding: 0 var(--space-sm); }
        .sidebar-link { display: flex; align-items: center; color: var(--medium); text-decoration: none; padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500; cursor: pointer; }
        .sidebar-link.active { background-color: var(--primary-light); color: var(--primary-dark); font-weight: 600; }
        .main-content { flex-grow: 1; padding: var(--space-xl); max-width: calc(100% - 260px); margin-left: 260px; margin-top: 54px; background-color: var(--light); transition: background-color 0.3s; }
        .button { display: inline-flex; align-items: center; justify-content: center; padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); font-weight: 500; font-size: var(--text-sm); cursor: pointer; transition: all var(--transition-fast); border: none; background-color: var(--primary); color: white; height: 36px; }
        .button.secondary { background-color: white; color: var(--primary); border: 1px solid var(--light-gray); }
        .button.danger { background-color: var(--danger); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 2050; justify-content: center; align-items: center; }
        .modal-content { background-color: white; padding: var(--space-xl); border-radius: var(--radius-lg); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .close-button { float: right; font-size: var(--text-xl); cursor: pointer; }
        .post-card { background: white; border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-lg); box-shadow: var(--shadow-sm); cursor: pointer; transition: all var(--transition-normal); border: 1px solid var(--light-gray); }
        .post-card.expanded { position: fixed; top: 54px; left: 260px; right: 0; bottom: 0; z-index: 100; overflow-y: auto; margin: 0; padding: var(--space-xl); background: white; cursor: default; }
        .expanded-post-controls { position: fixed; top: 54px; left: 260px; right: 0; height: 56px; background: var(--lighter); border-bottom: 1px solid var(--light-gray); display: none; align-items: center; justify-content: space-between; padding: 0 var(--space-lg); z-index: 101; }
        .reminders-container { background: var(--lighter); border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-xl); border: 1px solid var(--light-gray); }
        .reminders-list { column-count: 3; column-gap: var(--space-md); }
        .reminder-card { background: var(--lighter); border-left: 5px solid var(--primary); padding: var(--space-md); border-radius: var(--radius-md); margin-bottom: var(--space-md); break-inside: avoid; box-shadow: var(--shadow-sm); }
        .search-container { position: relative; flex-grow: 1; max-width: 400px; }
        .search-input { width: 100%; height: 38px; padding: var(--space-sm) var(--space-md); border-radius: var(--radius-full); border: 1px solid var(--light-gray); }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main-content { max-width: 100%; margin-left: 0; } .post-card.expanded { left: 0; } .reminders-list { column-count: 1; } }
        .snackbar { visibility: hidden; min-width: 300px; background-color: var(--dark-gray); color: white; border-radius: var(--radius-lg); position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: var(--space-sm) var(--space-lg); z-index: 3000; display: flex; align-items: center; gap: var(--space-md); }
        .snackbar.show { visibility: visible; }
        .collection-card { background: var(--light); border-left: 4px solid var(--secondary); border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-lg); cursor: pointer; }
        .editor-header { display: flex; justify-content: space-between; align-items: center; padding: var(--space-sm) var(--space-xl); background: var(--lighter); border-bottom: 1px solid var(--light-gray); }
        .custom-editor-area { min-height: 300px; outline: none; padding: var(--space-md); line-height: 1.6; }
        .custom-toolbar { background: var(--lighter); border: 1px solid var(--light-gray); border-radius: var(--radius-lg); padding: var(--space-xs); display: flex; flex-wrap: wrap; gap: var(--space-xs); margin-bottom: var(--space-md); }
        .toolbar-button { background: transparent; border: none; width: 34px; height: 34px; border-radius: var(--radius-md); cursor: pointer; }
        #announcement-editor-overlay, #collection-view-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 2000; display: flex; flex-direction: column; transform: translateY(100%); visibility: hidden; transition: transform var(--transition-normal); }
        #announcement-editor-overlay.visible, #collection-view-overlay.visible { transform: translateY(0); visibility: visible; }
    </style>
</head>
<body class="non-admin">
    <div class="topbar"><div class="topbar-content"><div class="topbar-left"><img src="https://i.imgur.com/AYocV6k.png" class="topbar-logo"><span class="topbar-title">Glendowie College</span></div><div class="topbar-links"><div class="profile-dropdown"><img id="profile-pic" src="https://ui-avatars.com/api/?background=3EA899&color=fff&name=Admin" style="width:36px;height:36px;border-radius:50%;cursor:pointer"><div class="profile-dropdown-content"><a href="#" class="dark-mode-toggle"><i class="fas fa-moon"></i> Dark Mode</a><a href="#" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Reset Demo</a></div></div></div></div></div>
    <button class="menu-toggle" id="menu-toggle" style="display:none">☰</button>
    <aside class="sidebar"><div class="sidebar-header"><img src="https://projectspace.nz/ujalvxpj/Main/Official%20Website/Content/GDCHUBLOGO.png" class="sidebar-logo"><h2 class="sidebar-title">GDCHUB</h2><button class="add-tab-header-button" onclick="openTabEditor()"><i class="fas fa-plus"></i></button></div><ul class="sidebar-menu" id="sidebar-menu"></ul></aside>
    <main class="main-content" id="main-content">
        <div class="reminders-container"><div class="reminders-header"><h2>Upcoming Reminders</h2><div class="admin-buttons"><button class="button secondary" onclick="openCategoryManager()">Manage Classes</button><button class="button" onclick="openReminderEditor()">+ Add Reminder</button></div></div><div class="reminders-list" id="reminders-list"></div></div>
        <header class="header-content"><h1 id="current-tab-title">Classroom</h1><div><button class="button secondary" onclick="openCollectionEditor()">Create Collection</button><button class="button" onclick="openAnnouncementEditor()">Create Announcement</button></div></header>
        <div class="search-container"><input type="text" class="search-input" id="announcement-search" placeholder="Search..."><button class="search-clear" onclick="clearSearch()">×</button></div>
        <div id="pinned-posts-header" style="display:none;"><i class="fas fa-thumbtack"></i><h2>Pinned</h2></div>
        <div id="pinned-posts-feed"></div><div id="unpinned-posts-feed"></div>
    </main>
    <div id="expanded-post-controls" class="expanded-post-controls"><button id="expanded-back-btn" class="button"><i class="fas fa-chevron-left"></i> Back</button><div id="expanded-actions-container"></div></div>

    <!-- Modals (preserved structure) -->
    <div id="reminder-editor" class="modal"><div class="modal-content"><span class="close-button" onclick="closeReminderEditor()">×</span><h2>Reminder</h2><input type="text" id="reminder-title" placeholder="Title"><input type="date" id="reminder-date"><select id="reminder-type"><option value="trip">Trip</option><option value="test">Test</option></select><select id="reminder-category"></select><textarea id="reminder-description" placeholder="Description"></textarea><div class="modal-buttons"><button class="button secondary" onclick="closeReminderEditor()">Cancel</button><button class="button" onclick="saveReminder()">Save</button></div></div></div>
    <div id="announcement-editor-overlay"><div class="editor-header"><h2>Announcement</h2><div><select id="announcement-category"></select><button class="button secondary" onclick="closeAnnouncementEditor()">Cancel</button><button class="button" id="save-announcement-button" onclick="saveAnnouncement()">Post</button></div></div><div class="custom-toolbar" id="custom-toolbar"><button class="toolbar-button" data-command="bold"><i class="fas fa-bold"></i></button><button class="toolbar-button" data-command="italic"><i class="fas fa-italic"></i></button><button class="toolbar-button" data-command="insertUnorderedList"><i class="fas fa-list-ul"></i></button><button class="toolbar-button" data-command="createLink"><i class="fas fa-link"></i></button></div><input type="text" id="announcement-title" placeholder="Title..."><div id="announcement-content" class="custom-editor-area" contenteditable="true"></div></div>
    <div id="tab-editor-modal" class="modal"><div class="modal-content"><span class="close-button" onclick="closeTabEditor()">×</span><h2>Tab</h2><input type="text" id="tab-name-input"><div class="modal-buttons"><button class="button secondary" onclick="closeTabEditor()">Cancel</button><button class="button" onclick="saveTab()">Save</button></div></div></div>
    <div id="collection-editor-modal" class="modal"><div class="modal-content"><span class="close-button" onclick="closeCollectionEditor()">×</span><h2>Collection</h2><input type="text" id="collection-name-input"><div class="modal-buttons"><button class="button secondary" onclick="closeCollectionEditor()">Cancel</button><button class="button" onclick="saveCollection()">Save</button></div></div></div>
    <div id="category-manager-modal" class="modal"><div class="modal-content"><span class="close-button" onclick="closeCategoryManager()">×</span><h2>Classes</h2><div id="category-manager-list"></div><input type="text" id="new-category-name" placeholder="New class"><button class="button" onclick="addCategory()">Add</button></div></div>
    <div id="confirmation-modal" class="modal"><div class="modal-content"><h2>Confirm</h2><p id="confirmation-message"></p><button class="button danger" id="confirm-action">Delete</button><button class="button secondary" onclick="closeConfirmation()">Cancel</button></div></div>
    <div id="undo-snackbar" class="snackbar"><span id="undo-message"></span><button id="undo-button">UNDO</button></div>

    <script>
        // ======================== GOOGLE SHEETS BACKEND ========================
        // CONFIGURATION: Replace with your Google Apps Script Web App URL
        const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbz9G7Qx9xJq3N8pP1rR2sS3tT4uU5vV6wW7xX8yY9zZ/exec"; 
        // NOTE: For demo, this is a placeholder. In production, deploy your own Apps Script.
        // For this demo to work without external server, we'll use localStorage as fallback + simulated sheets.
        // But to truly use Google Sheets, deploy the script from the provided guide.
        
        // For seamless demo that works offline, we use localStorage + simulated API.
        // However the architecture is ready: any change triggers sync to sheets via fetch.
        let isOnline = true;
        let pendingSync = false;
        
        async function callSheetsAPI(action, data) {
            try {
                const response = await fetch(SHEETS_API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // For demo; in real use CORS must be configured
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, data, subject: currentSubject, year: currentYear })
                });
                console.log(`Synced ${action} to sheets`);
                return true;
            } catch (err) {
                console.warn("Offline mode: changes saved locally, will sync later", err);
                pendingSync = true;
                return false;
            }
        }
        
        async function syncAllToSheets() {
            const fullData = {
                tabs, announcements: allAnnouncements, reminders, classes: unifiedClasses, collections: allCollections
            };
            await callSheetsAPI('SYNC_ALL', fullData);
        }
        
        // Load initial data from localStorage (simulating sheets fetch)
        function loadFromLocalStorage() {
            const saved = localStorage.getItem(`gdc_data_${currentSubject}_${currentYear}`);
            if(saved) {
                const data = JSON.parse(saved);
                tabs = data.tabs || [];
                allAnnouncements = data.announcements || {};
                reminders = data.reminders || [];
                unifiedClasses = data.classes || [];
                allCollections = data.collections || {};
                return true;
            }
            return false;
        }
        
        function saveToLocalStorage() {
            const data = { tabs, announcements: allAnnouncements, reminders, classes: unifiedClasses, collections: allCollections };
            localStorage.setItem(`gdc_data_${currentSubject}_${currentYear}`, JSON.stringify(data));
            // Also attempt background sync
            if(navigator.onLine) syncAllToSheets();
        }
        
        // Helper to update any collection and persist
        function persistUpdate(collection, id, updates) {
            if(collection === 'tabs') {
                const idx = tabs.findIndex(t => t.id === id);
                if(idx !== -1) Object.assign(tabs[idx], updates);
                saveToLocalStorage();
                renderTabs();
                if(currentTabId === id) setActiveTab(id, true);
            } else if(collection === 'announcements') {
                if(!allAnnouncements[currentTabId]) allAnnouncements[currentTabId] = {};
                if(updates === null) delete allAnnouncements[currentTabId][id];
                else Object.assign(allAnnouncements[currentTabId][id], updates);
                saveToLocalStorage();
                if(currentTabId) filterAnnouncements();
            } else if(collection === 'reminders') {
                const idx = reminders.findIndex(r => r.id === id);
                if(updates === null) reminders.splice(idx,1);
                else if(idx !== -1) Object.assign(reminders[idx], updates);
                else reminders.push(updates);
                saveToLocalStorage();
                renderReminders();
            } else if(collection === 'classes') {
                if(updates === null) unifiedClasses = unifiedClasses.filter(c => c.id !== id);
                else if(id) { const idx = unifiedClasses.findIndex(c => c.id === id); if(idx!==-1) unifiedClasses[idx]=updates; else unifiedClasses.push(updates); }
                saveToLocalStorage();
                populateCategoryDropdowns();
                renderCategoryManagerList();
            } else if(collection === 'collections') {
                if(!allCollections[currentTabId]) allCollections[currentTabId] = {};
                if(updates === null) delete allCollections[currentTabId][id];
                else Object.assign(allCollections[currentTabId][id], updates);
                saveToLocalStorage();
                if(currentTabId) filterAnnouncements();
            }
        }
        
        // ======================== ORIGINAL LOGIC ADAPTED ========================
        const urlParams = new URLSearchParams(window.location.search);
        const currentSubject = urlParams.get('subject') || 'Mathematics';
        const currentYear = urlParams.get('year') || '12';
        
        let tabs = [];
        let currentTabId = null;
        let allAnnouncements = {}; // { tabId: { postId: post } }
        let reminders = [];
        let unifiedClasses = [];
        let allCollections = {}; // { tabId: { collectionId: collection } }
        let isAdmin = true; // Admin mode enabled for demo
        
        let selectedClass = localStorage.getItem(`selectedClass_${currentSubject}_${currentYear}`) || 'ALL_CLASSES';
        let expandedPost = null;
        let currentTabAnnouncements = [];
        let collections = [];
        
        function init() {
            if(!loadFromLocalStorage()) {
                // Seed demo data
                tabs = [{ id: "tab1", name: "Classroom", order: 0 }];
                unifiedClasses = [{ id: "c1", name: "12Math" }, { id: "c2", name: "ALL" }];
                allAnnouncements = { tab1: { "post1": { id:"post1", title:"Welcome!", content:"<p>First post</p>", category:"ALL", pinned:true, order:Date.now() } } };
                reminders = [{ id:"rem1", title:"Test", date:new Date(Date.now()+86400000).toISOString().slice(0,10), category:"12Math", type:"test", description:"Study", order:0 }];
                allCollections = { tab1: {} };
                saveToLocalStorage();
            }
            unifiedClasses = unifiedClasses.filter(c => c.name !== 'ALL_CLASSES');
            if(!unifiedClasses.some(c=>c.name==='ALL')) unifiedClasses.push({ id:"all_class", name:"ALL" });
            renderTabs();
            if(tabs.length) setActiveTab(tabs[0].id);
            populateCategoryDropdowns();
            renderReminders();
            setupEventListeners();
        }
        
        function populateCategoryDropdowns() {
            const options = unifiedClasses.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('reminder-category').innerHTML = `<option value="">Select class</option>${options}`;
            document.getElementById('announcement-category').innerHTML = `<option value="">Select class</option>${options}`;
            const filterSelect = document.getElementById('class-filter');
            if(filterSelect) filterSelect.innerHTML = `<option value="ALL_CLASSES">All Classes</option>${options}`;
            if(filterSelect) filterSelect.value = selectedClass;
        }
        
        function renderTabs() {
            const menu = document.getElementById('sidebar-menu');
            menu.innerHTML = tabs.map(tab => `<li class="sidebar-item" data-id="${tab.id}"><a class="sidebar-link ${tab.id===currentTabId?'active':''}" onclick="setActiveTab('${tab.id}')">${tab.name}</a><button class="tab-action-btn" onclick="editTab('${tab.id}')"><i class="fas fa-pencil-alt"></i></button><button class="tab-action-btn delete" onclick="deleteTab('${tab.id}')"><i class="fas fa-trash-alt"></i></button></li>`).join('');
        }
        
        function setActiveTab(tabId, force=false) {
            currentTabId = tabId;
            localStorage.setItem(`lastActiveTabId_${currentSubject}_${currentYear}`, tabId);
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.querySelector(`.sidebar-item[data-id="${tabId}"] .sidebar-link`).classList.add('active');
            currentTabAnnouncements = allAnnouncements[tabId] ? Object.values(allAnnouncements[tabId]) : [];
            collections = allCollections[tabId] ? Object.values(allCollections[tabId]) : [];
            filterAnnouncements();
            document.getElementById('current-tab-title').innerText = tabs.find(t=>t.id===tabId)?.name || 'Classroom';
        }
        
        function filterAnnouncements() {
            let posts = [...currentTabAnnouncements];
            let cols = [...collections];
            if(selectedClass !== 'ALL_CLASSES') {
                posts = posts.filter(p => p.category === selectedClass || p.category === 'ALL');
                cols = [];
            }
            const search = document.getElementById('announcement-search').value.toLowerCase();
            if(search) posts = posts.filter(p => p.title.toLowerCase().includes(search));
            const pinned = posts.filter(p => p.pinned).sort((a,b)=>a.order-b.order);
            const unpinned = posts.filter(p => !p.pinned).sort((a,b)=>b.order-a.order);
            document.getElementById('pinned-posts-header').style.display = pinned.length ? 'flex' : 'none';
            document.getElementById('pinned-posts-feed').innerHTML = pinned.map(p => createPostHTML(p)).join('');
            document.getElementById('unpinned-posts-feed').innerHTML = [...unpinned, ...cols.map(c => createCollectionHTML(c))].join('');
            attachPostListeners();
        }
        
        function createPostHTML(post) {
            const pinIcon = post.pinned ? '<div class="pin-icon"><i class="fas fa-thumbtack"></i></div>' : '';
            const actions = `<div class="post-actions"><button class="post-action-btn pin-btn" onclick="togglePin('${post.id}')"><i class="fas fa-thumbtack"></i></button><button class="post-action-btn edit-btn" onclick="editAnnouncement('${post.id}')"><i class="fas fa-pencil-alt"></i></button><button class="post-action-btn delete-btn" onclick="deleteAnnouncement('${post.id}')"><i class="fas fa-trash-alt"></i></button></div>`;
            return `<div class="post-card" data-id="${post.id}">${pinIcon}${actions}<h3>${post.title}</h3><div class="collapsed-content">${post.content.replace(/<[^>]*>/g,'').slice(0,100)}</div><div class="post-details"><div class="post-content">${post.content}</div><div class="post-meta">${new Date(post.order).toLocaleString()}</div></div></div>`;
        }
        
        function createCollectionHTML(col) {
            return `<div class="collection-card" data-id="${col.id}" onclick="openCollectionView('${col.id}')"><div class="collection-card-header"><i class="fas fa-layer-group"></i><h3>${col.title}</h3></div><div class="collection-card-meta">${col.postIds?.length || 0} items</div><div class="post-actions"><button class="post-action-btn edit-btn" onclick="event.stopPropagation();openCollectionEditor('${col.id}')"><i class="fas fa-pencil-alt"></i></button><button class="post-action-btn delete-btn" onclick="event.stopPropagation();deleteCollection('${col.id}')"><i class="fas fa-trash-alt"></i></button></div></div>`;
        }
        
        function attachPostListeners() {
            document.querySelectorAll('.post-card').forEach(card => card.addEventListener('click', (e) => { if(!e.target.closest('button')) expandPost(card); }));
        }
        
        function expandPost(el) { if(expandedPost) collapsePost(); el.classList.add('expanded'); expandedPost = el; document.getElementById('expanded-post-controls').style.display = 'flex'; document.getElementById('expanded-actions-container').innerHTML = el.querySelector('.post-actions')?.innerHTML || ''; document.getElementById('expanded-back-btn').onclick = collapsePost; }
        function collapsePost() { if(expandedPost) expandedPost.classList.remove('expanded'); document.getElementById('expanded-post-controls').style.display = 'none'; expandedPost = null; }
        
        function renderReminders() {
            let filtered = reminders.filter(r => selectedClass === 'ALL_CLASSES' ? true : r.category === selectedClass || r.category === 'ALL');
            filtered.sort((a,b)=>a.order-b.order);
            document.getElementById('reminders-list').innerHTML = filtered.map(r => `<div class="reminder-card ${r.type}" data-id="${r.id}"><div class="reminder-title">${r.title}</div><div class="reminder-date">${r.date}</div>${r.description?`<div>${r.description}</div>`:''}<div class="reminder-actions"><button onclick="editReminder('${r.id}')">✏️</button><button onclick="deleteReminder('${r.id}')">🗑️</button></div></div>`).join('');
        }
        
        // Admin Actions with Google Sheets sync
        window.saveTab = () => { let name = document.getElementById('tab-name-input').value; if(name) { let newTab = { id: Date.now()+"", name, order: tabs.length }; tabs.push(newTab); persistUpdate('tabs', newTab.id, newTab); closeTabEditor(); } };
        window.editTab = (id) => { document.getElementById('tab-name-input').value = tabs.find(t=>t.id===id).name; currentTabBeingEdited = id; tabEditorModal.style.display='flex'; };
        window.deleteTab = (id) => { showConfirmation("Delete tab?", ()=>{ tabs = tabs.filter(t=>t.id!==id); persistUpdate('tabs', id, null); if(currentTabId===id) setActiveTab(tabs[0]?.id); }); };
        window.saveAnnouncement = () => { let title = document.getElementById('announcement-title').value; let content = document.getElementById('announcement-content').innerHTML; let category = document.getElementById('announcement-category').value; if(title && category) { let newPost = { id: Date.now()+"", title, content, category, pinned: false, order: Date.now() }; if(!allAnnouncements[currentTabId]) allAnnouncements[currentTabId]={}; allAnnouncements[currentTabId][newPost.id]=newPost; persistUpdate('announcements', newPost.id, newPost); closeAnnouncementEditor(); } };
        window.editAnnouncement = (id) => { let post = allAnnouncements[currentTabId][id]; document.getElementById('announcement-title').value = post.title; document.getElementById('announcement-content').innerHTML = post.content; document.getElementById('announcement-category').value = post.category; currentAnnouncementBeingEdited = id; announcementEditorOverlay.classList.add('visible'); };
        window.deleteAnnouncement = (id) => { showConfirmation("Delete announcement?", ()=>{ persistUpdate('announcements', id, null); if(expandedPost && expandedPost.dataset.id === id) collapsePost(); }); };
        window.togglePin = (id) => { let post = allAnnouncements[currentTabId][id]; if(post) { post.pinned = !post.pinned; persistUpdate('announcements', id, post); } };
        window.saveReminder = () => { let title = document.getElementById('reminder-title').value; let date = document.getElementById('reminder-date').value; let category = document.getElementById('reminder-category').value; if(title && date && category) { let rem = { id: Date.now()+"", title, date, category, type: document.getElementById('reminder-type').value, description: document.getElementById('reminder-description').value, order: reminders.length }; reminders.push(rem); persistUpdate('reminders', rem.id, rem); closeReminderEditor(); } };
        window.editReminder = (id) => { let r = reminders.find(r=>r.id===id); document.getElementById('reminder-title').value = r.title; document.getElementById('reminder-date').value = r.date; document.getElementById('reminder-category').value = r.category; document.getElementById('reminder-type').value = r.type; document.getElementById('reminder-description').value = r.description; currentReminderBeingEdited = id; document.getElementById('reminder-editor').style.display='flex'; };
        window.deleteReminder = (id) => { showConfirmation("Delete reminder?", ()=>{ persistUpdate('reminders', id, null); }); };
        window.addCategory = () => { let name = document.getElementById('new-category-name').value; if(name && !unifiedClasses.some(c=>c.name===name)) { let newClass = { id: Date.now()+"", name }; persistUpdate('classes', newClass.id, newClass); document.getElementById('new-category-name').value=''; } };
        window.saveCollection = () => { let title = document.getElementById('collection-name-input').value; if(title) { let newCol = { id: Date.now()+"", title, postIds: [], pinned: false, order: Date.now() }; if(!allCollections[currentTabId]) allCollections[currentTabId]={}; allCollections[currentTabId][newCol.id]=newCol; persistUpdate('collections', newCol.id, newCol); closeCollectionEditor(); } };
        window.openCollectionView = (id) => { let col = allCollections[currentTabId][id]; document.getElementById('collection-view-title').innerText = col.title; let feed = document.getElementById('collection-view-feed'); feed.innerHTML = (col.postIds || []).map(pid => { let p = allAnnouncements[currentTabId][pid]; return p?createPostHTML(p):''; }).join(''); collectionViewOverlay.classList.add('visible'); };
        window.deleteCollection = (id) => { showConfirmation("Delete collection?", ()=>{ persistUpdate('collections', id, null); }); };
        
        function showConfirmation(msg, onYes) { document.getElementById('confirmation-message').innerText = msg; document.getElementById('confirm-action').onclick = ()=>{ closeConfirmation(); onYes(); }; document.getElementById('confirmation-modal').style.display='flex'; }
        function closeConfirmation() { document.getElementById('confirmation-modal').style.display='none'; }
        function openTabEditor() { document.getElementById('tab-editor-modal').style.display='flex'; }
        function closeTabEditor() { document.getElementById('tab-editor-modal').style.display='none'; }
        function openAnnouncementEditor() { document.getElementById('announcement-title').value=''; document.getElementById('announcement-content').innerHTML=''; announcementEditorOverlay.classList.add('visible'); }
        function closeAnnouncementEditor() { announcementEditorOverlay.classList.remove('visible'); }
        function openReminderEditor() { document.getElementById('reminder-editor').style.display='flex'; }
        function closeReminderEditor() { document.getElementById('reminder-editor').style.display='none'; }
        function openCategoryManager() { renderCategoryManagerList(); document.getElementById('category-manager-modal').style.display='flex'; }
        function closeCategoryManager() { document.getElementById('category-manager-modal').style.display='none'; }
        function renderCategoryManagerList() { document.getElementById('category-manager-list').innerHTML = unifiedClasses.map(c => `<div>${c.name} <button onclick="deleteCategory('${c.id}')">🗑️</button></div>`).join(''); }
        window.deleteCategory = (id) => { unifiedClasses = unifiedClasses.filter(c=>c.id!==id); persistUpdate('classes', id, null); renderCategoryManagerList(); populateCategoryDropdowns(); };
        function openCollectionEditor() { document.getElementById('collection-editor-modal').style.display='flex'; }
        function closeCollectionEditor() { document.getElementById('collection-editor-modal').style.display='none'; }
        function clearSearch() { document.getElementById('announcement-search').value=''; filterAnnouncements(); }
        
        function setupEventListeners() {
            document.getElementById('class-filter').addEventListener('change', (e) => { selectedClass = e.target.value; localStorage.setItem(`selectedClass_${currentSubject}_${currentYear}`, selectedClass); filterAnnouncements(); renderReminders(); });
            document.getElementById('announcement-search').addEventListener('input', filterAnnouncements);
            document.querySelector('.dark-mode-toggle').addEventListener('click', (e) => { e.preventDefault(); document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode', document.body.classList.contains('dark-mode')); });
            document.querySelector('.logout-btn').addEventListener('click', (e) => { e.preventDefault(); localStorage.clear(); location.reload(); });
            document.querySelectorAll('.modal .close-button, .modal .button.secondary').forEach(btn => btn.addEventListener('click', (e) => { if(btn.closest('.modal')) btn.closest('.modal').style.display='none'; }));
        }
        
        // Toolbar commands
        document.getElementById('custom-toolbar')?.addEventListener('click', (e) => { let btn = e.target.closest('.toolbar-button'); if(btn) { let cmd = btn.dataset.command; if(cmd==='createLink') { let url = prompt("Enter URL"); if(url) document.execCommand('createLink', false, url); } else document.execCommand(cmd, false, null); document.getElementById('announcement-content').focus(); } });
        
        init();
    </script>
</body>
</html>
