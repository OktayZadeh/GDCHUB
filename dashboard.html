<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDCHUB Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3EA899;
            --primary-dark: #2D7D78;
            --light: #F7FAFC;
            --lighter: #FFFFFF;
            --dark: #1A202C;
            --medium: #718096;
            --light-gray: #E2E8F0;
        }
        body { font-family: 'Inter', sans-serif; margin:0; background: var(--light); color: var(--dark); }
        .topbar { background: white; padding: 12px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 100; }
        .sidebar { width: 260px; background: white; position: fixed; top: 54px; bottom: 0; border-right: 1px solid #ddd; padding: 20px 0; overflow-y: auto; }
        .main-content { margin-left: 260px; padding: 70px 20px 20px; }
        .button { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; }
        .button.secondary { background: white; color: var(--primary); border: 1px solid #ddd; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .post-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; cursor: pointer; }
        .sidebar-link { padding: 10px 20px; display: block; color: #555; text-decoration: none; }
        .sidebar-link.active { background: #E0F2F1; color: var(--primary-dark); font-weight: 600; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="topbar">
    <div><strong>GDCHUB</strong> - Classroom</div>
    <div>
        <button class="button" onclick="openAnnouncementEditor()">New Announcement</button>
        <button class="button secondary" onclick="openReminderEditor()">New Reminder</button>
    </div>
</div>

<aside class="sidebar">
    <h3 style="padding:0 20px 10px;">Tabs</h3>
    <div id="sidebar-menu"></div>
    <button class="button" style="margin:15px 20px;width:calc(100% - 40px)" onclick="openTabEditor()">+ New Tab</button>
</aside>

<main class="main-content">
    <h1 id="current-tab-title">Loading...</h1>
    
    <div style="margin:20px 0">
        <input type="text" id="announcement-search" placeholder="Search..." style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;">
    </div>

    <div id="pinned-posts-feed"></div>
    <div id="unpinned-posts-feed"></div>
</main>

<!-- Modals -->
<div id="tab-editor-modal" class="modal">
    <div class="modal-content">
        <h2 id="tab-editor-title">New Tab</h2>
        <input type="text" id="tab-name-input" placeholder="Tab name" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:6px;">
        <div style="text-align:right">
            <button class="button secondary" onclick="closeTabEditor()">Cancel</button>
            <button class="button" onclick="saveTab()">Save</button>
        </div>
    </div>
</div>

<div id="announcement-editor-modal" class="modal">
    <div class="modal-content">
        <h2 id="announcement-editor-title">New Announcement</h2>
        <input type="text" id="announcement-title" placeholder="Title" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:6px;">
        <textarea id="announcement-content" placeholder="Content..." style="width:100%;height:200px;padding:10px;border:1px solid #ddd;border-radius:6px;"></textarea>
        <select id="announcement-category" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:6px;">
            <option value="">Select Class</option>
        </select>
        <div style="text-align:right">
            <button class="button secondary" onclick="closeAnnouncementEditor()">Cancel</button>
            <button class="button" onclick="saveAnnouncement()">Post</button>
        </div>
    </div>
</div>

<div id="reminder-editor-modal" class="modal">
    <div class="modal-content">
        <h2>New Reminder</h2>
        <input type="text" id="reminder-title" placeholder="Title" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:6px;">
        <input type="date" id="reminder-date" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:6px;">
        <select id="reminder-category" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:6px;">
            <option value="">Select Class</option>
        </select>
        <div style="text-align:right">
            <button class="button secondary" onclick="closeReminderEditor()">Cancel</button>
            <button class="button" onclick="saveReminder()">Save</button>
        </div>
    </div>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyQFfiB9quW1LZagAC4Cw_PnUBnFrY7mUVMmCe0dm7GXYZJomcX690L80jSMkmzNJKeHQ/exec";

let tabs = [];
let currentTabId = null;
let announcements = [];
let reminders = [];
let classes = [];

// Simple API functions
async function apiGet(action, params = {}) {
    const url = new URL(WEBAPP_URL);
    url.searchParams.set('action', action);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    const res = await fetch(url);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || "API error");
    return json.data || [];
}

async function apiPost(action, body) {
    const res = await fetch(WEBAPP_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({action, ...body})
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || "API error");
    return json;
}

// Load data
async function loadData() {
    try {
        [tabs, classes, reminders] = await Promise.all([
            apiGet('getTabs'),
            apiGet('getClasses'),
            apiGet('getReminders')
        ]);
        tabs.sort((a,b) => (a.order||0) - (b.order||0));
        renderTabs();
        populateClassSelects();
        if (tabs.length) setActiveTab(tabs[0].id);
    } catch(e) {
        console.error(e);
        alert("Failed to load data from Google Sheets.\nCheck your Apps Script deployment and make sure it's set to 'Anyone' access.");
    }
}

function renderTabs() {
    const menu = document.getElementById('sidebar-menu');
    menu.innerHTML = tabs.map(t => `
        <div class="sidebar-link ${t.id === currentTabId ? 'active' : ''}" onclick="setActiveTab('${t.id}')">${t.name}</div>
    `).join('');
}

async function setActiveTab(tabId) {
    currentTabId = tabId;
    document.getElementById('current-tab-title').textContent = tabs.find(t => t.id === tabId)?.name || "Tab";
    announcements = await apiGet('getAnnouncements', {tabId});
    renderAnnouncements();
}

function renderAnnouncements() {
    const container = document.getElementById('unpinned-posts-feed');
    container.innerHTML = announcements.map(a => `
        <div class="post-card" onclick="alert('Post: ${a.title}')">
            <strong>${a.title}</strong><br>
            <small>${a.category || ''}</small>
            <div style="margin-top:8px;font-size:0.9em;color:#666;">${(a.content||'').substring(0,120)}...</div>
        </div>
    `).join('') || '<p>No announcements yet.</p>';
}

function populateClassSelects() {
    const html = classes.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    document.getElementById('announcement-category').innerHTML = `<option value="">Select Class</option><option value="ALL">ALL</option>` + html;
    document.getElementById('reminder-category').innerHTML = `<option value="">Select Class</option><option value="ALL">ALL</option>` + html;
}

// Editor functions
function openTabEditor() {
    document.getElementById('tab-editor-modal').style.display = 'flex';
    document.getElementById('tab-name-input').focus();
}

function closeTabEditor() {
    document.getElementById('tab-editor-modal').style.display = 'none';
}

async function saveTab() {
    const name = document.getElementById('tab-name-input').value.trim();
    if (!name) return alert("Tab name required");
    const newTab = { id: Date.now().toString(36), name, order: tabs.length };
    tabs.push(newTab);
    await apiPost('saveTabs', {data: tabs});
    closeTabEditor();
    renderTabs();
    setActiveTab(newTab.id);
}

function openAnnouncementEditor() {
    if (!currentTabId) return alert("Create a tab first");
    document.getElementById('announcement-editor-modal').style.display = 'flex';
}

function closeAnnouncementEditor() {
    document.getElementById('announcement-editor-modal').style.display = 'none';
}

async function saveAnnouncement() {
    const title = document.getElementById('announcement-title').value.trim();
    const content = document.getElementById('announcement-content').value.trim();
    const category = document.getElementById('announcement-category').value;
    if (!title || !category) return alert("Title and class required");

    const newAnn = {
        id: Date.now().toString(36),
        title,
        content,
        category,
        pinned: false,
        order: Date.now()
    };

    announcements.push(newAnn);
    await apiPost('saveAnnouncements', { tabId: currentTabId, data: announcements });
    closeAnnouncementEditor();
    renderAnnouncements();
}

function openReminderEditor() {
    document.getElementById('reminder-editor-modal').style.display = 'flex';
}

function closeReminderEditor() {
    document.getElementById('reminder-editor-modal').style.display = 'none';
}

async function saveReminder() {
    const title = document.getElementById('reminder-title').value.trim();
    const date = document.getElementById('reminder-date').value;
    const category = document.getElementById('reminder-category').value;
    if (!title || !date || !category) return alert("Title, date and class required");

    reminders.push({
        id: Date.now().toString(36),
        title,
        date,
        category,
        order: reminders.length
    });

    await apiPost('saveReminders', {data: reminders});
    closeReminderEditor();
    alert("Reminder saved");
}

// Start the app
document.addEventListener('DOMContentLoaded', () => {
    loadData();
});
</script>
</body>
</html>
