<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDCHUB Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3EA899; --dark: #1A202C; --light: #F7FAFC; }
        body { font-family: 'Inter', sans-serif; margin:0; background:#F7FAFC; color:#1A202C; }
        .topbar { background:white; padding:12px 20px; box-shadow:0 2px 8px rgba(0,0,0,0.1); position:fixed; width:100%; z-index:100; display:flex; justify-content:space-between; align-items:center; }
        .sidebar { width:260px; background:white; position:fixed; top:56px; bottom:0; border-right:1px solid #ddd; overflow-y:auto; padding:20px 0; }
        .main-content { margin-left:260px; padding:80px 20px 20px; }
        .button { background:#3EA899; color:white; border:none; padding:10px 16px; border-radius:6px; cursor:pointer; font-weight:500; }
        .button.secondary { background:white; color:#3EA899; border:1px solid #ddd; }
        .post-card { background:white; border:1px solid #ddd; border-radius:8px; padding:16px; margin-bottom:16px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:25px; border-radius:12px; width:90%; max-width:500px; max-height:90vh; overflow-y:auto; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
        .sidebar-link { padding:12px 20px; display:block; color:#555; text-decoration:none; border-radius:6px; margin:4px 10px; }
        .sidebar-link.active { background:#E0F2F1; color:#2D7D78; font-weight:600; }
        .debug { position:fixed; bottom:10px; right:10px; background:#333; color:#0f0; padding:8px; font-size:12px; border-radius:4px; max-width:300px; z-index:9999; display:none; }
    </style>
</head>
<body>

<div class="topbar">
    <strong>GDCHUB</strong>
    <div>
        <button class="button" onclick="testConnection()">Test Connection</button>
        <button class="button" onclick="openTabEditor()">+ Tab</button>
        <button class="button" onclick="openAnnouncementEditor()">New Announcement</button>
        <button class="button secondary" onclick="openReminderEditor()">New Reminder</button>
    </div>
</div>

<aside class="sidebar">
    <h3 style="padding:0 20px 10px;margin:0;">Tabs</h3>
    <div id="sidebar-menu"></div>
</aside>

<main class="main-content">
    <h1 id="current-tab-title">Loading...</h1>
    <div id="posts-container"></div>
</main>

<!-- Modals -->
<div id="tab-modal" class="modal"><div class="modal-content">
    <h2>New Tab</h2>
    <input id="tab-name" placeholder="Tab name" style="width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:6px;">
    <div style="text-align:right">
        <button class="button secondary" onclick="closeModals()">Cancel</button>
        <button class="button" onclick="saveTab()">Save Tab</button>
    </div>
</div></div>

<div id="ann-modal" class="modal"><div class="modal-content">
    <h2>New Announcement</h2>
    <input id="ann-title" placeholder="Title" style="width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:6px;">
    <textarea id="ann-content" placeholder="Content..." style="width:100%;height:180px;padding:12px;border:1px solid #ddd;border-radius:6px;"></textarea>
    <select id="ann-category" style="width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:6px;"></select>
    <div style="text-align:right">
        <button class="button secondary" onclick="closeModals()">Cancel</button>
        <button class="button" onclick="saveAnnouncement()">Post Announcement</button>
    </div>
</div></div>

<div id="rem-modal" class="modal"><div class="modal-content">
    <h2>New Reminder</h2>
    <input id="rem-title" placeholder="Title" style="width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:6px;">
    <input type="date" id="rem-date" style="width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:6px;">
    <select id="rem-category" style="width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:6px;"></select>
    <div style="text-align:right">
        <button class="button secondary" onclick="closeModals()">Cancel</button>
        <button class="button" onclick="saveReminder()">Save Reminder</button>
    </div>
</div></div>

<div id="debug" class="debug"></div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyQFfiB9quW1LZagAC4Cw_PnUBnFrY7mUVMmCe0dm7GXYZJomcX690L80jSMkmzNJKeHQ/exec";

let currentTabId = null;
let tabs = [];
let announcements = [];
let reminders = [];
let classes = [];

// Debug helper
function log(msg) {
    console.log("[GDCHUB]", msg);
    const debugEl = document.getElementById('debug');
    debugEl.style.display = 'block';
    debugEl.innerHTML += `<div>${msg}</div>`;
    setTimeout(() => { debugEl.style.display = 'none'; debugEl.innerHTML = ''; }, 8000);
}

// API calls
async function apiGet(action, params = {}) {
    log(`GET → ${action}`);
    const url = new URL(WEBAPP_URL);
    url.searchParams.set('action', action);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    const res = await fetch(url);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || "API error");
    log(`GET ${action} OK`);
    return json.data || [];
}

async function apiPost(action, body = {}) {
    log(`POST → ${action}`);
    const res = await fetch(WEBAPP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...body })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || "API error");
    log(`POST ${action} OK`);
    return json;
}

// Test connection
async function testConnection() {
    try {
        const data = await apiGet('getTabs');
        alert("✅ Connection successful!\nTabs loaded: " + data.length);
    } catch(e) {
        alert("❌ Connection failed\n\n" + e.message + "\n\nCheck your Apps Script deployment is set to 'Anyone' and redeploy.");
    }
}

// Load everything
async function loadData() {
    try {
        [tabs, classes, reminders] = await Promise.all([
            apiGet('getTabs'),
            apiGet('getClasses'),
            apiGet('getReminders')
        ]);
        renderTabs();
        populateClassSelects();
        if (tabs.length > 0) setActiveTab(tabs[0].id);
        else log("No tabs yet - create one");
    } catch(e) {
        log("LOAD ERROR: " + e.message);
        alert("Could not load data.\n\nError: " + e.message);
    }
}

function renderTabs() {
    const menu = document.getElementById('sidebar-menu');
    menu.innerHTML = tabs.map(t => `
        <div class="sidebar-link ${t.id === currentTabId ? 'active' : ''}" onclick="setActiveTab('${t.id}')">${t.name}</div>
    `).join('');
}

async function setActiveTab(id) {
    currentTabId = id;
    document.getElementById('current-tab-title').textContent = tabs.find(t => t.id === id)?.name || "Tab";
    announcements = await apiGet('getAnnouncements', { tabId: id });
    renderPosts();
}

function renderPosts() {
    const container = document.getElementById('posts-container');
    container.innerHTML = announcements.map(a => `
        <div class="post-card">
            <strong>${a.title}</strong><br>
            <small>${a.category || ''}</small>
            <div style="margin-top:8px;font-size:0.9em;color:#555;">${(a.content || '').substring(0, 150)}...</div>
        </div>
    `).join('') || '<p>No announcements yet. Create one above.</p>';
}

function populateClassSelects() {
    const html = classes.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    document.getElementById('ann-category').innerHTML = `<option value="">Select Class</option><option value="ALL">ALL</option>` + html;
    document.getElementById('rem-category').innerHTML = `<option value="">Select Class</option><option value="ALL">ALL</option>` + html;
}

// Tab
function openTabEditor() { document.getElementById('tab-modal').style.display = 'flex'; }
function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

async function saveTab() {
    const name = document.getElementById('tab-name').value.trim();
    if (!name) return alert("Enter tab name");
    const newTab = { id: Date.now().toString(36), name, order: tabs.length };
    tabs.push(newTab);
    await apiPost('saveTabs', { data: tabs });
    closeModals();
    renderTabs();
    setActiveTab(newTab.id);
}

// Announcement
function openAnnouncementEditor() {
    if (!currentTabId) return alert("Create a tab first");
    document.getElementById('ann-modal').style.display = 'flex';
}

async function saveAnnouncement() {
    const title = document.getElementById('ann-title').value.trim();
    const content = document.getElementById('ann-content').value.trim();
    const category = document.getElementById('ann-category').value;
    if (!title || !category) return alert("Title and class required");

    const newAnn = { id: Date.now().toString(36), title, content, category, pinned: false, order: Date.now() };
    announcements.push(newAnn);
    await apiPost('saveAnnouncements', { tabId: currentTabId, data: announcements });
    closeModals();
    renderPosts();
    alert("✅ Announcement posted to spreadsheet");
}

// Reminder
function openReminderEditor() { document.getElementById('rem-modal').style.display = 'flex'; }

async function saveReminder() {
    const title = document.getElementById('rem-title').value.trim();
    const date = document.getElementById('rem-date').value;
    const category = document.getElementById('rem-category').value;
    if (!title || !date || !category) return alert("Title, date and class required");

    reminders.push({ id: Date.now().toString(36), title, date, category, order: reminders.length });
    await apiPost('saveReminders', { data: reminders });
    closeModals();
    alert("✅ Reminder saved to spreadsheet");
}

// Start
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
